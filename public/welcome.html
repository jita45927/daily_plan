<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>欢迎</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
.welcome-container {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: opacity 0.8s ease-out;
  position: relative;
}
.welcome-container.fade-out {
  opacity: 0;
}
.progress-section {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
}
.progress-bar-container {
  width: 100%;
  height: 4px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s ease;
}
</style>
</head>
<body>
<div class="welcome-container" id="welcomeContainer">
  <div class="progress-section">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
</div>

<script>
const progressBar = document.getElementById('progressBar');
const welcomeContainer = document.getElementById('welcomeContainer');

window.__TAURI_IPC__ = window.__TAURI_IPC__ || window.__tauri_ipc__;

function updateProgress(percent) {
  progressBar.style.width = percent + '%';
}

function fadeOut() {
  welcomeContainer.classList.add('fade-out');
  setTimeout(() => {
    if (window.close) {
      window.close();
    }
  }, 800);
}

if (window.__TAURI_IPC__) {
  try {
    window.__TAURI_IPC__.listen('progress_update', (event) => {
      const { percent } = event.payload;
      updateProgress(percent);
    });
    
    window.__TAURI_IPC__.listen('app_ready', () => {
      updateProgress(100);
      setTimeout(fadeOut, 500);
    });
  } catch (e) {
    console.error('Failed to set up Tauri listeners:', e);
    setTimeout(fadeOut, 3000);
  }
} else {
  setTimeout(fadeOut, 3000);
}

updateProgress(10);
</script>
</body>
</html>
